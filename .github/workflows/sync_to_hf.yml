name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # IMPORTANT: Replace 'Shreyansh2341' and 'Netra_Advance-AI-to-Detect-and-Block-UPI-Frauds' below
          git push https://Shreyansh2341:$HF_TOKEN@huggingface.co/spaces/Shreyansh2341/Netra_Advance-AI-to-Detect-and-Block-UPI-Frauds main -f
